sonar.projectKey=VizzleTF_CommitSage
sonar.organization=vizzletf

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=CommitSage
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/out/**,**/*.test.ts

# Test coverage report (generated by `vitest run --coverage`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions: VS Code glue exercised by e2e tests (tests/e2e) rather
# than vitest unit tests — the browser webview, the extension entrypoint, the
# webview settings provider (UI), the top-level AI orchestration and
# commit-generation flows (aiService/commitWorkflow), and the command
# registration layer (commands/*, thin wrappers over vscode.commands /
# window.showInputBox). Everything else is unit-tested to 100%.
sonar.coverage.exclusions=src/views/webview/**,src/extension.ts,src/views/settingsWebviewProvider.ts,src/services/aiService.ts,src/services/commitWorkflow.ts,src/commands/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Fail the CI job when the Quality Gate fails (new vulnerabilities / security hotspots).
# This makes the SonarCloud check block PR merges.
sonar.qualitygate.wait=true
