sonar.projectKey=VizzleTF_CommitSage
sonar.organization=vizzletf

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=CommitSage
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/out/**,**/*.test.ts

# Test coverage report (generated by `vitest run --coverage`).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Browser-side webview code runs in the VS Code webview, not in Node — it is
# exercised by e2e tests, not vitest unit tests, so exclude it from coverage.
sonar.coverage.exclusions=src/views/webview/**,src/extension.ts

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Fail the CI job when the Quality Gate fails (new vulnerabilities / security hotspots).
# This makes the SonarCloud check block PR merges.
sonar.qualitygate.wait=true
