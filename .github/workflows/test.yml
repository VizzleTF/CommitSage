name: Test

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stub API key constant
        # src/constants/apiKeys.ts is gitignored and generated only by the
        # release pipeline. Lint resolves it via import-x; without a stub
        # `import-x/no-unresolved` fails. The value here is a placeholder
        # that never reaches a real network — tests use a mock LLM server.
        run: |
          mkdir -p src/constants
          echo "export const AMPLITUDE_API_KEY = 'e2e-test-stub';" > src/constants/apiKeys.ts

      - name: Lint
        run: npx eslint 'src/**/*.ts'

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Compile E2E tests
        run: npx tsc -p tests/e2e/tsconfig.e2e.json

      - name: Cache VS Code download
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-stable

      - name: E2E tests (xvfb)
        run: xvfb-run -a npm run test:e2e
