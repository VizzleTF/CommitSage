name: Create Release and Publish to Marketplaces

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      notes: ${{ steps.release_notes.outputs.NOTES }}
      telegram_msg: ${{ steps.release_notes.outputs.TELEGRAM_MSG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set API Key
        run: |
          mkdir -p src/constants
          echo "export const AMPLITUDE_API_KEY = '${{ secrets.AMPLITUDE_API_KEY }}';" > src/constants/apiKeys.ts

      - name: Build
        run: npm run compile

      - name: Package Extension
        run: npm run package

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: bash .github/scripts/generate-release-notes.sh

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: vsix
          path: '*.vsix'
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix

      - name: Create Release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_NOTES: ${{ needs.build.outputs.notes }}
        with:
          script: |
            const fs = require('fs');
            const { repo: { owner, repo } } = context;
            const tag = context.ref.substring(10);
            const version = process.env.VERSION;
            const releaseNotes = process.env.RELEASE_NOTES;

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });

            const vsixFile = `geminicommit-${version}.vsix`;
            if (fs.existsSync(vsixFile)) {
              const asset = await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.data.id,
                name: vsixFile,
                data: fs.readFileSync(vsixFile)
              });
              console.log(`Asset uploaded: ${asset.data.browser_download_url}`);
            } else {
              core.setFailed(`VSIX file not found: ${vsixFile}`);
            }

  publish-vscode:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: npx @vscode/vsce publish --packagePath "geminicommit-${{ needs.build.outputs.version }}.vsix" -p "$VSCE_PAT"

  publish-openvsx:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vsix

      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx publish "geminicommit-${{ needs.build.outputs.version }}.vsix" -p "$OVSX_PAT"

  notify:
    needs: [build, release, publish-vscode, publish-openvsx]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Write Telegram message
        env:
          MSG: ${{ needs.build.outputs.telegram_msg }}
        run: printf '%s\n' "$MSG" > telegram_message.txt

      - name: Send Telegram Notification
        continue-on-error: true
        uses: appleboy/telegram-action@221e6b684967abe813051ee4a37dd61770a83ad3 # v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message_file: telegram_message.txt

      - name: Notify on Security Release
        if: contains(needs.build.outputs.notes, 'important security updates')
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_NOTES: ${{ needs.build.outputs.notes }}
        with:
          script: |
            const version = process.env.VERSION;
            const releaseNotes = process.env.RELEASE_NOTES;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security Release v${version} Published`,
              body: [
                `A new security patch release v${version} has been published.`,
                '',
                'Release Notes:',
                releaseNotes,
                '',
                'The extension has been automatically updated in the Visual Studio Marketplace.'
              ].join('\n'),
              labels: ['security']
            });
